name: Build and Publish PropEditorX

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven
        
    - name: Build with Maven
      run: ./mvnw clean verify -B
      
    - name: Prepare P2 Landing Page
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: cp releng/io.github.xenogew.propedit.repository/index.html releng/io.github.xenogew.propedit.repository/target/repository/

    - name: Upload P2 Repository (Directory)
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: actions/upload-artifact@v4
      with:
        name: p2-repository
        path: releng/io.github.xenogew.propedit.repository/target/repository/

    - name: Upload P2 Repository (Zip)
      if: startsWith(github.ref, 'refs/tags/v')
      uses: actions/upload-artifact@v4
      with:
        name: p2-repository-zip
        path: releng/io.github.xenogew.propedit.repository/target/*.zip

  deploy-pages:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Download P2 Repository
      uses: actions/download-artifact@v4
      with:
        name: p2-repository
        path: repository
        
    - name: Deploy to GitHub Pages
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: repository
        branch: gh-pages

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Download P2 Repository Zip
      uses: actions/download-artifact@v4
      with:
        name: p2-repository-zip
        path: release-artifacts
        
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: release-artifacts/*.zip
        generate_release_notes: true
        draft: false
        prerelease: false
